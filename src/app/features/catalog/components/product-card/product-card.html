<article class="group overflow-hidden rounded-[2rem] border border-[#eadfbe] bg-[#fffdf8] shadow-[0_24px_70px_-34px_rgba(44,31,3,0.22)] transition duration-300 hover:-translate-y-1.5 hover:shadow-[0_30px_80px_-30px_rgba(44,31,3,0.28)]">
  <div class="relative overflow-hidden bg-[#f6f0df]">
    <div class="relative aspect-[4/5] w-full overflow-hidden">
      @if (coverImage) {
        <img
          [src]="primaryImage"
          [alt]="product.name"
          class="absolute inset-0 h-full w-full object-cover transition duration-700 group-hover:-translate-y-3 group-hover:scale-105 group-hover:opacity-0"
        />
        <img
          [src]="coverImage"
          [alt]="product.name + ' detail view'"
          class="absolute inset-0 h-full w-full translate-y-3 scale-[1.02] object-cover opacity-0 transition duration-700 group-hover:translate-y-0 group-hover:scale-110 group-hover:opacity-100"
        />
      } @else {
        <img
          [src]="primaryImage"
          [alt]="product.name"
          class="absolute inset-0 h-full w-full object-cover transition duration-1000 group-hover:scale-105"
        />
      }

      @if (cornerImage) {
        <img
          [src]="cornerImage"
          [alt]="product.name + ' badge'"
          class="pointer-events-none absolute right-4 top-4 h-14 w-14 object-contain"
        />
      }
    </div>

    <div class="pointer-events-none absolute inset-y-0 left-[-45%] w-1/3 -skew-x-12 bg-gradient-to-r from-transparent via-white/60 to-transparent opacity-0 transition duration-[1600ms] group-hover:left-[120%] group-hover:opacity-100"></div>
    <div class="pointer-events-none absolute inset-x-0 bottom-0 h-28 bg-gradient-to-t from-[#3b2e0d]/15 to-transparent"></div>
  </div>

  <div class="space-y-4 p-5">
    <div class="space-y-2">
      <h2 class="text-xl font-semibold tracking-tight text-[#241c08]">
        {{ product.name }}
      </h2>
      <p class="text-lg font-medium text-[#7f6616]">
        {{ product.price | currency: 'USD' : 'symbol' : '1.0-0' }}
      </p>
    </div>

    <a
      [routerLink]="productRoute"
      class="inline-flex items-center justify-center rounded-full bg-[#9c7e1c] px-5 py-3 text-sm font-semibold text-white transition duration-300 hover:bg-[#7f6616]"
    >
      View
    </a>
  </div>
</article>
